<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="theme-color" content="#050607">
		<meta name="description" content="Offline set-list metronome for song tempos, time signatures, accents, capo positions, and notes.">
		<title>Tempest</title>
		<link rel="manifest" href="manifest.webmanifest">
		<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
		<link class="apple-touch-icon" href="icons/icon-192.png">
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<main class="app-shell">
			<!-- Navigation Tabs -->
			<nav class="panel-tabs" aria-label="Panel tabs">
				<button id="addSongControl" class="add-song-control" type="button" aria-label="New song">✚</button>
				<button id="freeModeToggle" class="plain-button toggle-button" type="button" title="Toggle Basic Mode" aria-label="Toggle basic mode" aria-pressed="false">⊙</button>
				<button id="flashToggle" class="plain-button toggle-button" type="button" title="Toggle Beat Flash" aria-label="Toggle Beat Flash" aria-pressed="false">🗲</button>
				<button id="settingsToggle" class="plain-button toggle-button" type="button" title="Toggle Global Settings" aria-label="Toggle global settings" aria-pressed="false">⚙</button>
				<button class="panel-tab active" data-tab="control" type="button">Control</button>
				<button class="panel-tab" data-tab="notes" type="button">Notes</button>
				<button class="panel-tab" data-tab="setlist" type="button">Setlist</button>
			</nav>
			<!-- Metronome Stage -->
			<section class="stage" aria-label="Metronome">
				<section class="sticky-console">
					<div class="stage-main">
						<!-- Song Header -->
						<header class="song-header">
							<textarea id="songName" class="song-name" rows="2" aria-label="Song name" placeholder="Song Title"></textarea>
						</header>
						<!-- Live Metronome Controls -->
						<section class="live-grid" aria-label="Live metronome controls">
							<section class="tempo-column">
								<div id="effectiveLabel" class="effective-label">Stored tempo</div>
								<div class="tempo-nudge-layout">
									<div class="nudge-column">
										<button class="nudge-btn" data-nudge="10" type="button">+10</button>
										<button class="nudge-btn" data-nudge="1" type="button">+1</button>
										<button class="nudge-btn" data-nudge="-1" type="button">-1</button>
										<button class="nudge-btn" data-nudge="-10" type="button">-10</button>
									</div>
									<div id="tempoValue" class="tempo-value" contenteditable="true" inputmode="numeric" aria-label="Tempo"></div>
								</div>
							</section>
							<!-- Settings Configuration -->
							<section class="settings-grid">
								<label style="grid-column: span 2">
								<span>Artist</span>
								<input id="artist" type="text" aria-label="Artist name">
								</label>
								<label>
								<span>Length</span>
								<input id="length" type="text" maxlength="5" placeholder="0:00" aria-label="Song length">
								</label>
								<label>
								<span>Capo</span>
								<input id="capo" type="number" min="0" max="16" aria-label="Capo position">
								</label>
								<label>
									<span>Time</span>
									<div class="time-sig-input">
										<input id="timeSigBeats" type="number" min="1" max="99" placeholder="4" aria-label="Beats per bar">
										<input id="timeSigValue" type="number" min="1" max="99" placeholder="4" aria-label="Beat value">
									</div>
								</label>
								<label>
								<span>Sub</span>
								<input id="subdivision" type="number" min="1" max="16" aria-label="Subdivision">
								</label>
								<div class="settings-actions">
									<span aria-hidden="true">&nbsp;</span>
									<button id="doubleTime" class="plain-button toggle-button" type="button" aria-pressed="false">Double</button>
								</div>
								<div class="settings-actions">
									<span aria-hidden="true">&nbsp;</span>
									<button id="swingToggle" class="plain-button toggle-button" type="button" aria-pressed="false">Swing</button>
								</div>
								<div class="settings-actions">
									<span aria-hidden="true">&nbsp;</span>
									<button id="tapTempo" class="plain-button" type="button">Tap</button>
								</div>
							</section>
						</section>
						<!-- Practice Speed Controls -->
						<section class="practice-speed" aria-label="Temporary tempo adjustment">
							<div class="practice-speed-label">MOD</div>
							<div class="speed-track">
								<input id="practiceSpeed" type="range" min="-50" max="50" step="5" value="0" aria-label="Practice speed">
							</div>
							<div id="practiceSpeedLabel" class="practice-speed-label">0%</div>
						</section>
						<!-- Playback Transport -->
						<section class="transport">
							<button id="previousSong" type="button" aria-label="Previous song">◀◀</button>
							<button id="playToggle" class="play-button" type="button" aria-label="Play metronome">▶</button>
							<button id="nextSong" type="button" aria-label="Next song">▶▶</button>
						</section>
						<div id="beatDisplay" class="beat-display" aria-label="Beats in bar"></div>
					</div>
					<!-- Notes Panel Dropdown -->
					<section class="notes-panel" data-panel="notes">
						<label for="notes">Notes</label>
						<textarea id="notes" rows="24" placeholder="..."></textarea>
					</section>
					<section id="globalSettingsPanel" class="global-settings-panel" aria-label="Global settings" hidden>
						<header class="song-header">
							<div class="song-name">Global Settings</div>
						</header>
						<div class="settings-panel-grid">
							<label>
							<span>Beat Freq.</span>
							<input id="gBeatFrequency" type="number" min="1" max="4000" aria-label="Beat frequency">
							</label>
							<label>
							<span>Accent Freq.</span>
							<input id="gAccentFrequency" type="number" min="1" max="4000" aria-label="Accent frequency">
							</label>
							<label>
							<span>Sub Freq.</span>
							<input id="gSubFrequency" type="number" min="1" max="4000" aria-label="Subdivision frequency">
							</label>
							<label>
							<span>Beat Vol.</span>
							<input id="gBeatVolume" type="number" min="0" max="100" aria-label="Beat volume">
							</label>
							<label>
							<span>Accent Vol.</span>
							<input id="gAccentVolume" type="number" min="0" max="100" aria-label="Accent volume">
							</label>
							<label>
							<span>Sub Vol.</span>
							<input id="gSubVolume" type="number" min="0" max="100" aria-label="Subdivision volume">
							</label>
						</div>
						<br><br>
						<div class="global-settings-subheading">Defaults</div>
						<br>
						<div class="settings-panel-grid">
							<label>
							<span>Tempo</span>
							<input id="gDefaultTempo" type="number" min="1" max="400" aria-label="Default tempo">
							</label>
							<label style="grid-column: span 2">
							<span>Artist</span>
							<input id="gDefaultArtist" type="text" aria-label="Default artist">
							</label>
							<label>
							<span>Capo</span>
							<input id="gDefaultCapo" type="number" min="0" max="16" aria-label="Default capo">
							</label>
							<label>
								<span>Time</span>
								<div class="time-sig-input">
									<input id="gDefaultBeatsPerBar" type="number" min="1" max="99" placeholder="4" aria-label="Default beats per bar">
									<input id="gDefaultBeatValue" type="number" min="1" max="99" placeholder="4" aria-label="Default beat value">
								</div>
							</label>
							<label>
							<span>Sub</span>
							<input id="gDefaultSubdivision" type="number" min="1" max="16" aria-label="Default subdivision">
							</label>
							<div class="settings-actions">
								<span aria-hidden="true">&nbsp;</span>
								<button id="gDefaultDoubleTime" class="plain-button toggle-button" type="button" aria-pressed="false">Double</button>
							</div>
							<div class="settings-actions">
								<span aria-hidden="true">&nbsp;</span>
								<button id="gDefaultSwing" class="plain-button toggle-button" type="button" aria-pressed="false">Swing</button>
							</div>
							<div class="settings-actions">
								<span aria-hidden="true">&nbsp;</span>
								<button id="gDefaultAccent" class="plain-button toggle-button" type="button" aria-pressed="false">Accent 1</button>
							</div>
						</div>
					</section>
				</section>
<div class="stage-footer">
    <a href="https://github.com/JohnathanCrow/tempest" target="_blank" rel="noopener" class="github-button"><img src="icons/github-24.png" alt="GitHub" width="20" height="20"></a>
    <img src="logo_small.png" alt="Tempest" class="stage-logo" width="190" height="38">
</div>
			</section>
			<!-- Sidebar Set List Management -->
			<aside class="set-list" aria-label="Set list">
				<div class="setlist-bar">
					<div class="custom-select-wrapper">
						<button id="setlistDropdownTrigger" class="setlist-select" type="button" aria-haspopup="listbox" aria-expanded="false">Setlist 1</button>
						<ul id="setlistDropdownOptions" class="custom-options-list" role="listbox" hidden>
							<li role="option" aria-selected="true" data-value="Setlist 1">Setlist 1</li>
						</ul>
					</div>
					<button id="addSetlist" class="plain-button" type="button" title="New Setlist" aria-label="New setlist">+</button>
					<button id="renameSetlist" class="plain-button" type="button" title="Rename Setlist" aria-label="Rename setlist">✎</button>
					<button id="deleteSetlist" class="plain-button" type="button" title="Delete Setlist" aria-label="Delete setlist">×</button>
				</div>
				<div class="set-actions">
					<button id="exportSongs" type="button">Export</button>
					<button id="replaceSongs" type="button">Import</button>
					<button id="mergeSongs" type="button">Merge</button>
					<button id="clearSongs" type="button">Clear</button>
					<input id="importFile" type="file" accept="application/json" hidden>
				</div>
				<div class="sort-actions">
					<button data-sort="custom" type="button">Custom</button>
					<button data-sort="name" type="button">A-Z</button>
					<button data-sort="tempo" type="button">BPM</button>
					<button data-sort="capo" type="button">Capo</button>
				</div>
				</span>
				<div class="song-actions-bottom">
					<button id="addSong" type="button" aria-label="New song">New Song</button>
					<button id="addDivider" type="button" aria-label="Add divider">Divider</button>
				</div>
				<div id="songsList" class="songs"></div>
			</aside>
			<div id="customModal" class="modal-backdrop" hidden>
				<div class="modal-box" role="dialog" aria-modal="true">
					<p id="modalMessage" class="modal-message"></p>
					<input id="modalInput" class="modal-input" type="text" hidden>
					<div class="modal-actions">
						<button id="modalCancel" class="plain-button" type="button">Cancel</button>
						<button id="modalConfirm" class="plain-button" type="button">Confirm</button>
					</div>
				</div>
			</div>
		</main>
		<script src="app.js"></script>
	</body>
</html>
